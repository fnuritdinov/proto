syntax = "proto3";

package user.v1;

option go_package = "userpb/";


service UserService {
  rpc Register(RegisterUserRequest) returns (RegisterUserResponse);
  rpc Verify(VerifyUserRequest) returns (VerifyUserResponse);
  rpc Login(LoginUserRequest) returns (LoginUserResponse);
  rpc RefreshToken(RefreshTokenUserRequest) returns (RefreshTokenUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc GetUserMe(GetUserMeRequest) returns (GetUserMeResponse);
  rpc CheckToken(CheckTokenRequest) returns (CheckTokenResponse);

}

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  int32 age = 5;
  string role = 6;
}

message RegisterUserRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
  string password = 4;
  int32 age = 5;
}

message RegisterUserResponse {
  string message = 1;
}

message VerifyUserRequest {
  string email = 1;
  string code = 2;
}

message VerifyUserResponse {
  int64 id = 1;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message LoginUserResponse {
  string accessToken = 1;
  string refreshToken = 2;
}

message RefreshTokenUserRequest {
  string refreshToken = 1;
}

message RefreshTokenUserResponse {
  string refreshToken = 1;
  string accessToken = 2;
  int64 userID = 3;
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  int64 id = 1;
  string name = 2;
  string phone = 3;
}

message UpdateUserResponse {
  int64 code = 1;
  string message = 2;
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated User users = 1;
}

message GetUserMeRequest {
  int64 id = 1;
}

message GetUserMeResponse {
  User user = 1;
}

message CheckTokenRequest {
  string access_token = 1;
}

message CheckTokenResponse {
  User user = 1;
}